server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:false}
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:localhost:8858}
    gateway:
      routes:
        - id: auth-user-service
          uri: ${AUTH_USER_SERVICE_URI:http://localhost:8101}
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
        - id: product-service
          uri: ${PRODUCT_SERVICE_URI:http://localhost:8102}
          predicates:
            - Path=/api/products/**
          filters:
            - StripPrefix=1
        - id: trade-service
          uri: ${TRADE_SERVICE_URI:http://localhost:8103}
          predicates:
            - Path=/api/trade/**
          filters:
            - StripPrefix=1
        - id: search-service
          uri: ${SEARCH_SERVICE_URI:http://localhost:8104}
          predicates:
            - Path=/api/search/**
          filters:
            - StripPrefix=1
        - id: message-service
          uri: ${MESSAGE_SERVICE_URI:http://localhost:8105}
          predicates:
            - Path=/api/messages/**
          filters:
            - StripPrefix=1
